name: Generate Report

on:
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Generate report
        run: python3 gen_report.py
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tasks-report
          path: tasks_report.html
