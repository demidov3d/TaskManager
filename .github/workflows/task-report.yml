name: Task Report

on:
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Run report generator
        run: python3 report_generator.py
      
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: report.html
          retention-days: 7
