name: Tasks

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: python report.py
      - uses: actions/upload-artifact@v4
        with:
          name: report
          path: out.html
