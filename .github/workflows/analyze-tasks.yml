name: Analyze Tasks

on:
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Type of report'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - critical
          - overdue

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Create reports directory
        run: mkdir -p reports
      
      - name: Run analysis
        run: python scripts/analyze_tasks.py --type ${{ inputs.report_type }}
      
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tasks-report-${{ github.run_id }}
          path: reports/
          retention-days: 30
