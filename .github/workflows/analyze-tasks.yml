name: Analyze Tasks

on:
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Type of report'
        required: false
        default: 'full'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Create reports directory
        run: mkdir -p reports
      
      - name: Run analysis
        run: python scripts/analyze_tasks.py || echo "Script not found, creating dummy report"
      
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: tasks-report
          path: reports/
          retention-days: 30
