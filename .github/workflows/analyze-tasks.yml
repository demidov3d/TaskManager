name: Analyze Tasks

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Debug - Check JSON file
        run: |
          echo "=== Checking AI_Core_Tasks.json ==="
          ls -la AI_Core_Tasks.json
          head -20 AI_Core_Tasks.json
      
      - name: Generate HTML report
        run: |
          set -e
          echo "Starting script..."
          python scripts/generate_report.py 2>&1
          echo "Script finished"
          
      - name: Debug - Check output
        if: always()
        run: |
          echo "=== Checking reports directory ==="
          ls -la reports/ 2>/dev/null || echo "reports/ doesn't exist"
          echo "=== Files in root ==="
          ls -la | grep -E "\.html|\.md|reports"
      
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: reports/
